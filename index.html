<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣語文大冒險 - 鼓勵學習版</title>
    <style>
        :root {
            --primary-color: #2e7d32;
            --accent-color: #ff9800;
            --tile-size: clamp(100px, 15vw, 150px);
        }

        body {
            font-family: "Noto Sans TC", sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            background: url('https://images.unsplash.com/photo-1552912115-46387060156d?auto=format&fit=crop&w=1600&q=80') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
        }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: -1; }

        header { color: white; text-align: center; padding: 10px; text-shadow: 2px 2px 5px #000; }
        .top-info { background: rgba(255,255,255,0.95); padding: 8px 25px; border-radius: 30px; margin-bottom: 10px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 18px; }

        .board-container { width: 98%; max-width: 1050px; overflow-x: auto; padding: 10px; display: flex; justify-content: center; }

        #game-board {
            display: grid;
            grid-template-columns: repeat(6, var(--tile-size));
            grid-template-rows: repeat(6, var(--tile-size));
            gap: 5px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            border: 8px solid rgba(255,255,255,0.3);
            border-radius: 15px;
            position: relative;
        }

        .tile {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px; display: flex; flex-direction: column;
            align-items: center; padding: 5px; text-align: center;
        }
        .tile-name { font-weight: bold; font-size: clamp(14px, 1.8vw, 20px); margin-top: 2px; }
        .tile-img { width: 100%; height: 55%; object-fit: cover; border-radius: 5px; border: 1px solid #eee; }
        
        .city { border-bottom: 6px solid #2196f3; }
        .practice { border-bottom: 6px solid #fbc02d; background: #fffde7; }
        .chance { border-bottom: 6px solid #f06292; background: #fdf2f8; }
        .special { background: #eceff1; border-bottom: 6px solid #78909c; }

        .bus {
            width: 40px; height: 40px; position: absolute; z-index: 100;
            transition: all 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28); font-size: 34px;
            display: flex; align-items: center; justify-content: center;
        }

        #control-center {
            grid-column: 2 / 6; grid-row: 2 / 6;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.8); border-radius: 20px; margin: 10px;
        }

        .btn {
            padding: 12px 28px; font-size: 22px; font-weight: bold;
            cursor: pointer; background: #2e7d32; color: white; border: none;
            border-radius: 40px; box-shadow: 0 5px 0 #1b5e20; margin: 8px;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #1b5e20; }

        #status-panel { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 10px; }
        .team-card { background: white; padding: 10px 18px; border-radius: 10px; min-width: 110px; border-left: 10px solid #ccc; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .team-card.active { transform: scale(1.05); border-bottom: 4px solid var(--accent-color); }

        #modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85); display: none;
            justify-content: center; align-items: center; z-index: 2000;
        }
        #modal { background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 550px; text-align: center; }
        
        .hint-text { background: #e3f2fd; padding: 12px; margin: 10px 0; border-radius: 8px; color: #01579b; font-size: 18px; border-left: 5px solid #0288d1; }
        
        .quiz-opt {
            display: block; width: 100%; padding: 12px; margin: 8px 0;
            background: #f1f8e9; border: 2px solid #c5e1a5; border-radius: 8px;
            font-size: 18px; cursor: pointer; text-align: left;
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<header>
    <h1>🇹🇼 大富翁冒險 — 台灣旅遊文化</h1>
</header>

<div class="top-info">🎯 勝利目標：$3,000 | 鼓勵學習模式：錯誤不退回原點</div>

<div class="board-container">
    <div id="game-board">
        <div id="control-center">
            <div id="turn-display" style="font-weight: bold; margin-bottom: 5px;"></div>
            <div id="dice-display" style="font-size: 55px;">🎲</div>
            <button class="btn" id="roll-btn">擲骰子</button>
            <button id="reset-btn" style="background:none; border:none; color:#666; cursor:pointer; text-decoration:underline; font-size: 12px; margin-top:10px;">重置遊戲</button>
        </div>
    </div>
</div>

<div id="status-panel"></div>

<div id="modal-overlay">
    <div id="modal">
        <h2 id="modal-title" style="font-size: 18px; color: #666; margin: 0;"></h2>
        <div id="modal-desc" style="font-size: 24px; font-weight: bold; margin: 15px 0;"></div>
        
        <div id="hint-content" class="hint-text" style="display:none;"></div>

        <div id="quiz-area" style="display:none;"></div>

        <div id="practice-area" style="display:none;">
            <div style="display: flex; justify-content: space-around; margin-top: 20px;">
                <button class="btn" style="background: #43a047;" onclick="game.handleManual(true)">✅ 答對了 (+$500)</button>
                <button class="btn" style="background: #78909c;" onclick="game.handleManual(false)">❌ 再接再厲 (留在原位)</button>
            </div>
        </div>
        <button id="close-btn" class="btn" style="display:none;" onclick="game.closeModal()">繼續遊戲</button>
    </div>
</div>

<script>
const sound = {
    ctx: new (window.AudioContext || window.webkitAudioContext)(),
    play(freq, type, duration) {
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type; osc.frequency.value = freq;
        osc.connect(gain); gain.connect(this.ctx.destination);
        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + duration);
        osc.start(); osc.stop(this.ctx.currentTime + duration);
    },
    dice() { this.play(440, 'sine', 0.2); },
    win() { this.play(880, 'triangle', 0.5); },
    lose() { this.play(330, 'sine', 0.3); }
};

const WIN_MONEY = 3000;
const TILE_COUNT = 20;
const TEAMS = [
    { id: 0, name: "第一組", icon: "🚌", color: "#ff5252" },
    { id: 1, name: "第二組", icon: "🚐", color: "#448aff" },
    { id: 2, name: "第三組", icon: "🚓", color: "#4caf50" },
    { id: 3, name: "第四組", icon: "🚜", color: "#ffc107" }
];

const BOARD_DATA = [
    { name: "起點", type: "special", emoji: "🏁" },
    { name: "台北", type: "city", img: "台北.jpg", quizPool: [
        { q: "台北 101 大樓曾經是世界最高樓，它主要位於台北市哪個區？", a: ["信義區", "萬華區", "士林區"], correct: 0 },
        { q: "台北最有名的故宮博物院，裡面哪件文物最像蔬菜？", a: ["毛公鼎", "肉形石", "翠玉白菜"], correct: 2 },
        { q: "台北陽明山以什麼樣的地質特色著稱？", a: ["火山與溫泉", "冰河谷", "沙漠"], correct: 0 }
    ]},
    { name: "語法操練", type: "practice", img: "https://upload.wikimedia.org/wikipedia/commons/1/1d/Speech_bubbles_clipart.png", desc: "請用「不但...而且...」造句。", hint: "💡 提示：台北不但交通方便，而且美食很多。" },
    { name: "桃園", type: "city", img: "桃園.jpg", quizPool: [
        { q: "桃園機場是台灣的門戶，它的國際代碼是？", a: ["TPE", "KHH", "TSA"], correct: 0 },
        { q: "大溪老街最出名的名產是？", a: ["太陽餅", "豆乾", "麻糬"], correct: 1 },
        { q: "桃園有許多埤塘，這些埤塘古時候主要的功能是？", a: ["游泳", "農業灌溉", "賽船"], correct: 1 }
    ]},
    { name: "機會命運", type: "chance" },
    { name: "新竹", type: "city", img: "新竹.jpg", quizPool: [
        { q: "新竹因為地理位置的關係，風力特別強，因此被稱為什麼？", a: ["雨城", "風城", "太陽城"], correct: 1 },
        { q: "新竹科學園區是台灣發展什麼產業的重鎮？", a: ["紡織業", "高科技業", "造船業"], correct: 1 },
        { q: "新竹城隍廟最有名的小吃是什麼？", a: ["米粉與摃丸", "臭豆腐", "蚵仔煎"], correct: 0 }
    ]},
    { name: "語法操練", type: "practice", img: "https://upload.wikimedia.org/wikipedia/commons/1/1d/Speech_bubbles_clipart.png", desc: "請用「既然...就...」造句。", hint: "💡 提示：既然來到新竹，就一定要買貢丸。" },
    { name: "台中", type: "city", img: "台中.jpg", quizPool: [
        { q: "台中高美濕地最著名的景色是？", a: ["森林步道", "夕陽與風車", "高山瀑布"], correct: 1 },
        { q: "台中發明的知名國民飲品是？", a: ["珍珠奶茶", "檸檬紅茶", "可樂"], correct: 0 },
        { q: "台中彩虹眷村是誰一筆一畫彩繪出來的？", a: ["小學生", "彩虹爺爺", "外國畫家"], correct: 1 }
    ]},
    { name: "機會命運", type: "chance" },
    { name: "嘉義", type: "city", img: "嘉義.jpg", quizPool: [
        { q: "嘉義阿里山除了看日出，還有一條非常著名的？", a: ["森林小火車", "纜車", "地下鐵"], correct: 0 },
        { q: "嘉義是北回歸線經過的地方，這裡有一座？", a: ["北回歸線太陽館", "冰雕館", "海洋館"], correct: 0 },
        { q: "嘉義最出名的平民美食是？", a: ["火雞肉飯", "牛肉麵", "小籠包"], correct: 0 }
    ]},
    { name: "休息站", type: "special", emoji: "🍵" },
    { name: "台南", type: "city", img: "台南.jpg", quizPool: [
        { q: "台南是台灣最早開發的城市，被譽為什麼？", a: ["科技之都", "美食與古蹟之都", "滑雪之都"], correct: 1 },
        { q: "台南哪種早餐非常有特色且受歡迎？", a: ["牛肉湯", "義大利麵", "漢堡"], correct: 0 },
        { q: "赤崁樓以前是什麼人的治理中心？", a: ["荷蘭人", "西班牙人", "日本人"], correct: 0 }
    ]},
    { name: "語法操練", type: "practice", img: "https://upload.wikimedia.org/wikipedia/commons/1/1d/Speech_bubbles_clipart.png", desc: "請用「除非...才...」造句。", hint: "💡 提示：除非你去過台南，才知道什麼是美食之都。" },
    { name: "高雄", type: "city", img: "高雄.jpeg", quizPool: [
        { q: "高雄著名的龍虎塔，遊客必須由哪邊進、哪邊出才能趨吉避凶？", a: ["龍口進、虎口出", "虎口進、龍口出", "隨便進出"], correct: 0 },
        { q: "高雄愛河以前是什麼功能？", a: ["運河", "天然湖泊", "海水浴場"], correct: 0 },
        { q: "高雄著名的藝術園區名稱是？", a: ["駁二藝術特區", "草山園區", "科學園區"], correct: 0 }
    ]},
    { name: "機會命運", type: "chance" },
    { name: "台東", type: "city", img: "台東.jpeg", quizPool: [
        { q: "台東著名的伯朗大道，因為哪位明星拍廣告而爆紅？", a: ["金城武", "周杰倫", "劉德華"], correct: 0 },
        { q: "台東三仙台最著名的建築是？", a: ["跨海步橋", "燈塔", "摩天大樓"], correct: 0 },
        { q: "台東每年的夏天都會舉辦什麼大型嘉年華？", a: ["熱氣球嘉年華", "滑雪節", "衝浪節"], correct: 0 }
    ]},
    { name: "語法操練", type: "practice", img: "https://upload.wikimedia.org/wikipedia/commons/1/1d/Speech_bubbles_clipart.png", desc: "請用「與其...不如...」造句。", hint: "💡 提示：與其去百貨公司，不如去台東看風景。" },
    { name: "花蓮", type: "city", img: "花蓮.jpg", quizPool: [
        { q: "花蓮太魯閣國家公園以什麼樣的地質地貌著稱？", a: ["大理岩峽谷", "黃金沙灘", "熱帶雨林"], correct: 0 },
        { q: "花蓮哪一個海灘以美麗的弧線和卵石聞名？", a: ["七星潭", "墾丁", "外澳"], correct: 0 },
        { q: "花蓮是哪一個台灣原住民族人數最多的分佈地？", a: ["阿美族", "泰雅族", "排灣族"], correct: 0 }
    ]},
    { name: "機會命運", type: "chance" },
    { name: "宜蘭", type: "city", img: "宜蘭.jpg", quizPool: [
        { q: "宜蘭礁溪最吸引遊客的天然資源是？", a: ["平地溫泉", "高山冰川", "鐘乳石洞"], correct: 0 },
        { q: "宜蘭有一座造型特別的博物館叫做？", a: ["蘭陽博物館", "海洋博物館", "太空博物館"], correct: 0 },
        { q: "宜蘭非常有名的農產品是？", a: ["三星蔥", "草莓", "西瓜"], correct: 0 }
    ]}
];

const CHANCE_EVENTS = [
    { t: "恭喜！中獎發票 $1000！", m: 1000 },
    { t: "繳稅時間到！損失 $800！", m: -800 },
    { t: "大甲媽祖保佑！獲得獎金 $500！", m: 500 },
    { t: "外送踩雷，退費補償 $300！", m: 300 }
];

class TravelGame {
    constructor() {
        this.teamPos = [0, 0, 0, 0];
        this.teamMoney = [0, 0, 0, 0];
        this.currentIdx = 0;
        this.load();
        this.init();
    }

    init() {
        const board = document.getElementById('game-board');
        const gridMapping = ["6/1", "5/1", "4/1", "3/1", "2/1", "1/1", "1/2", "1/3", "1/4", "1/5", "1/6", "2/6", "3/6", "4/6", "5/6", "6/6", "6/5", "6/4", "6/3", "6/2"];
        BOARD_DATA.forEach((d, i) => {
            const t = document.createElement('div');
            t.className = `tile ${d.type}`;
            t.style.gridArea = gridMapping[i];
            t.id = `tile-${i}`;
            const imgSrc = d.img || '';
            t.innerHTML = `${imgSrc ? `<img class="tile-img" src="${imgSrc}" onerror="this.src='https://via.placeholder.com/150?text=${d.name}'">` : `<div style="font-size:35px">${d.emoji || '❓'}</div>`}<div class="tile-name">${d.name}</div>`;
            board.appendChild(t);
        });
        TEAMS.forEach(t => {
            const b = document.createElement('div'); b.className = 'bus'; b.id = `bus-${t.id}`; b.innerText = t.icon;
            board.appendChild(b);
        });
        this.update();
        this.positionBuses();
    }

    positionBuses() {
        this.teamPos.forEach((pos, id) => {
            const tile = document.getElementById(`tile-${pos}`);
            const bus = document.getElementById(`bus-${id}`);
            const offset = (id * 10) - 20;
            bus.style.left = (tile.offsetLeft + 35 + offset) + 'px';
            bus.style.top = (tile.offsetTop + 35 + offset) + 'px';
        });
    }

    async roll() {
        sound.dice();
        document.getElementById('roll-btn').disabled = true;
        const steps = Math.floor(Math.random() * 6) + 1;
        document.getElementById('dice-display').innerText = "🎲 " + steps;
        let p = this.teamPos[this.currentIdx];
        for (let i = 0; i < steps; i++) {
            p = (p + 1) % TILE_COUNT;
            if (p === 0) {
                this.teamMoney[this.currentIdx] += 1000;
                alert(`${TEAMS[this.currentIdx].name} 繞台領獎金 $1000！`);
            }
            this.teamPos[this.currentIdx] = p;
            this.positionBuses();
            await new Promise(r => setTimeout(r, 400));
        }
        this.checkTile(p);
    }

    checkTile(pos) {
        const d = BOARD_DATA[pos];
        const modal = document.getElementById('modal-overlay');
        const qArea = document.getElementById('quiz-area');
        const pArea = document.getElementById('practice-area');
        const hintBox = document.getElementById('hint-content');
        const cBtn = document.getElementById('close-btn');
        const desc = document.getElementById('modal-desc');

        qArea.style.display = 'none'; pArea.style.display = 'none'; cBtn.style.display = 'none'; hintBox.style.display = 'none';

        if (d.type === "city") {
            const randomQuiz = d.quizPool[Math.floor(Math.random() * d.quizPool.length)];
            document.getElementById('modal-title').innerText = `🏙️ ${d.name}`;
            desc.innerText = randomQuiz.q;
            qArea.innerHTML = '';
            randomQuiz.a.forEach((opt, i) => {
                const b = document.createElement('button'); b.className = 'quiz-opt'; b.innerText = `${i+1}. ${opt}`;
                b.onclick = () => this.handleQuiz(i === randomQuiz.correct);
                qArea.appendChild(b);
            });
            qArea.style.display = 'block';
            modal.style.display = 'flex';
        } else if (d.type === "practice") {
            document.getElementById('modal-title').innerText = "✍️ 語法造句";
            desc.innerText = d.desc;
            hintBox.innerText = d.hint;
            hintBox.style.display = 'block';
            pArea.style.display = 'block';
            modal.style.display = 'flex';
        } else if (d.type === "chance") {
            const ev = CHANCE_EVENTS[Math.floor(Math.random() * CHANCE_EVENTS.length)];
            document.getElementById('modal-title').innerText = "🎲 機會命運";
            desc.innerText = ev.t;
            this.teamMoney[this.currentIdx] += ev.m;
            cBtn.style.display = 'inline-block';
            modal.style.display = 'flex';
        } else {
            this.nextTurn();
        }
    }

    handleQuiz(isCorrect) {
        if (isCorrect) {
            sound.win();
            this.teamMoney[this.currentIdx] += 300;
            alert("答對了！獲得 $300 獎金！");
        } else {
            sound.lose();
            alert("答錯了沒關係，留在原地！");
        }
        this.closeModal();
    }

    handleManual(isCorrect) {
        if (isCorrect) {
            sound.win();
            this.teamMoney[this.currentIdx] += 500;
        } else {
            sound.lose();
            // 答錯不再退回，留在原地
        }
        this.closeModal();
    }

    closeModal() { document.getElementById('modal-overlay').style.display = 'none'; this.checkWin(); this.nextTurn(); }
    nextTurn() { this.currentIdx = (this.currentIdx + 1) % 4; this.update(); document.getElementById('roll-btn').disabled = false; }
    checkWin() { if (this.teamMoney[this.currentIdx] >= WIN_MONEY) { sound.win(); alert(`🏆 恭喜 ${TEAMS[this.currentIdx].name} 獲勝！`); this.reset(); } }
    update() {
        const p = document.getElementById('status-panel'); p.innerHTML = '';
        TEAMS.forEach((t, i) => {
            const c = document.createElement('div');
            c.className = `team-card ${i === this.currentIdx ? 'active' : ''}`;
            c.style.borderLeftColor = t.color;
            c.innerHTML = `<b>${t.name}</b><br>💰 $${this.teamMoney[i]}`;
            p.appendChild(c);
        });
        document.getElementById('turn-display').innerText = `輪到：${TEAMS[this.currentIdx].name}`;
        this.save();
    }
    save() { localStorage.setItem('taiwanGameV7', JSON.stringify({p: this.teamPos, m: this.teamMoney, idx: this.currentIdx})); }
    load() { const s = localStorage.getItem('taiwanGameV7'); if (s) { const d = JSON.parse(s); this.teamPos = d.p; this.teamMoney = d.m; this.currentIdx = d.idx; } }
    reset() { localStorage.removeItem('taiwanGameV7'); location.reload(); }
}

let game;
window.onload = () => { game = new TravelGame(); document.getElementById('roll-btn').onclick = () => game.roll(); document.getElementById('reset-btn').onclick = () => { if(confirm("確定重置進度？")) game.reset(); } };
</script>

</body>
</html>
