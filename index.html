<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣旅遊大富翁 - 語文教室對抗賽</title>
    <style>
        :root {
            --primary-green: #2e7d32;
            --accent-orange: #f57c00;
            --bg-color: #e8f5e9;
            --tile-size: 110px;
        }

        body {
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 標題與標籤 */
        header {
            text-align: center;
            padding: 15px;
            color: var(--primary-green);
        }

        /* 棋盤佈局 6x6 (共 20 格) */
        #game-board {
            display: grid;
            grid-template-columns: repeat(6, var(--tile-size));
            grid-template-rows: repeat(6, var(--tile-size));
            gap: 6px;
            background-color: #ffffff;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            margin-bottom: 20px;
        }

        /* 格子基礎樣式 */
        .tile {
            background: #fff;
            border: 2px solid #ddd;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 5px;
            font-size: 13px;
            overflow: hidden;
            position: relative;
            transition: transform 0.2s;
        }

        .tile:hover { transform: scale(1.02); z-index: 5; }
        
        /* 格子類型顏色 */
        .city { border-top: 6px solid #4fc3f7; }
        .practice { border-top: 6px solid #ffb74d; background: #fff8e1; }
        .chance { border-top: 6px solid #f06292; background: #fce4ec; }
        .special { background: #cfd8dc; font-weight: bold; }

        .tile img { width: 100%; height: 50px; object-fit: cover; border-radius: 4px; }
        .tile-name { font-weight: bold; margin-top: 4px; color: #333; }

        /* 中間控制區域 */
        #control-center {
            grid-column: 2 / 6;
            grid-row: 2 / 6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.9);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }

        /* 玩家棋子 (旅遊小巴士) */
        .bus {
            width: 32px;
            height: 32px;
            position: absolute;
            z-index: 100;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        /* 按鈕樣式 */
        .btn {
            padding: 12px 25px;
            font-size: 18px;
            cursor: pointer;
            background: var(--primary-green);
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 4px 0 #1b5e20;
            margin: 10px;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #1b5e20; }
        .btn:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }

        /* 側邊狀態欄 */
        #status-panel {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .team-card {
            background: white;
            padding: 10px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-left: 10px solid #ccc;
            min-width: 100px;
        }
        .team-card.active { border-bottom: 5px solid var(--accent-orange); transform: translateY(-5px); }

        /* 任務彈窗 */
        #modal-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        #modal {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }
        .modal-btns { display: flex; justify-content: space-around; margin-top: 20px; }
        .btn-correct { background: #4caf50; }
        .btn-wrong { background: #f44336; }

        /* 響應式微調 */
        @media (max-height: 800px) {
            :root { --tile-size: 90px; }
        }
    </style>
</head>
<body>

<header>
    <h1>🚌 台灣語文旅遊大冒險</h1>
    <p>中級語文課 · 團隊競賽版</p>
</header>

<div id="status-panel"></div>

<div id="game-board">
    <div id="control-center">
        <h3 id="turn-display">第一組準備出發</h3>
        <div id="dice-display" style="font-size: 50px; margin: 10px;">🎲</div>
        <button class="btn" id="roll-btn">擲骰子前進</button>
        <button class="btn" style="background:#777; font-size: 12px; box-shadow: none;" id="reset-btn">重設遊戲</button>
    </div>
</div>

<div id="modal-overlay">
    <div id="modal">
        <h2 id="modal-title">任務挑戰</h2>
        <div id="modal-image"></div>
        <p id="modal-desc" style="font-size: 18px; line-height: 1.6;"></p>
        <div class="modal-btns" id="action-btns">
            </div>
    </div>
</div>

<script>
/**
 * 💡 教學設計邏輯：
 * 1. 20格循環，第一位跨越/抵達起點者獲勝。
 * 2. 操練格：答錯會由程式執行「回退動畫」。
 * 3. 狀態儲存：利用 localStorage 防止教學中斷。
 */

const TILE_COUNT = 20;
const TEAMS = [
    { id: 0, name: "第一組", icon: "🚌", color: "#ff5252" },
    { id: 1, name: "第二組", icon: "🚐", color: "#448aff" },
    { id: 2, name: "第三組", icon: "🚓", color: "#4caf50" },
    { id: 3, name: "第四組", icon: "🚜", color: "#ffc107" }
];

const BOARD_DATA = [
    { name: "起點", type: "special", emoji: "🏁", info: "繞台灣一圈吧！" },
    { name: "台北", type: "city", img: "https://images.unsplash.com/photo-1583454155184-870a1f63aebc?auto=format&fit=crop&w=200", info: "101大樓是著名地標。" },
    { name: "語法操練", type: "practice", info: "請用「不但...而且...」造句。" },
    { name: "桃園", type: "city", img: "https://images.unsplash.com/photo-1570654639102-bdd95eeece7a?auto=format&fit=crop&w=200", info: "桃園機場是台灣的門戶。" },
    { name: "機會卡", type: "chance", info: "抽取一張驚喜卡！" },
    { name: "新竹", type: "city", img: "https://images.unsplash.com/photo-1571406451730-804193613098?auto=format&fit=crop&w=200", info: "台灣的矽谷，科學園區所在地。" },
    { name: "語法操練", type: "practice", info: "請用「既然...就...」造句。" },
    { name: "台中", type: "city", img: "https://images.unsplash.com/photo-159981881ef80-77a8286c8f92?auto=format&fit=crop&w=200", info: "珍珠奶茶的發源地！" },
    { name: "挑戰格", type: "chance", info: "全組大聲朗讀課文一段，失敗退一格。" },
    { name: "嘉義", type: "city", img: "https://images.unsplash.com/photo-1621929747188-0b4dc284980c?auto=format&fit=crop&w=200", info: "阿里山森林鐵路非常壯觀。" },
    { name: "中途休息", type: "special", emoji: "🍱", info: "吃個鐵路便當再出發。" },
    { name: "台南", type: "city", img: "https://images.unsplash.com/photo-1594132038755-d41c19be36e1?auto=format&fit=crop&w=200", info: "美食之都，古蹟非常多。" },
    { name: "語法操練", type: "practice", info: "請用「除非...才...」造句。" },
    { name: "高雄", type: "city", img: "https://images.unsplash.com/photo-1552057774-60b665679951?auto=format&fit=crop&w=200", info: "美麗的海港城市，愛河很浪漫。" },
    { name: "機會卡", type: "chance", info: "抽取一張驚喜卡！" },
    { name: "台東", type: "city", img: "https://images.unsplash.com/photo-1580665910386-8d1976a4455f?auto=format&fit=crop&w=200", info: "每年夏天有熱氣球嘉年華。" },
    { name: "語法操練", type: "practice", info: "請用「與其...不如...」造句。" },
    { name: "花蓮", type: "city", img: "https://images.unsplash.com/photo-1584981442475-430c51121857?auto=format&fit=crop&w=200", info: "太魯閣國家公園鬼斧神工。" },
    { name: "挑戰格", type: "chance", info: "抽取生詞卡，解釋三個詞彙。" },
    { name: "宜蘭", type: "city", img: "https://images.unsplash.com/photo-1628082601955-f7734a7ed27b?auto=format&fit=crop&w=200", info: "蔥餅跟溫泉是宜蘭的名產。" }
];

class TravelGame {
    constructor() {
        this.loadState();
        this.initUI();
    }

    loadState() {
        const saved = localStorage.getItem('taiwanGame');
        if (saved) {
            const data = JSON.parse(saved);
            this.teamPos = data.teamPos;
            this.currentTeamIdx = data.currentTeamIdx;
        } else {
            this.teamPos = [0, 0, 0, 0];
            this.currentTeamIdx = 0;
        }
    }

    saveState() {
        localStorage.setItem('taiwanGame', JSON.stringify({
            teamPos: this.teamPos,
            currentTeamIdx: this.currentTeamIdx
        }));
    }

    initUI() {
        const board = document.getElementById('game-board');
        const gridPos = [
            "6/1", "5/1", "4/1", "3/1", "2/1", "1/1", 
            "1/2", "1/3", "1/4", "1/5", "1/6", 
            "2/6", "3/6", "4/6", "5/6", "6/6",
            "6/5", "6/4", "6/3", "6/2"
        ];

        BOARD_DATA.forEach((data, i) => {
            const tile = document.createElement('div');
            tile.className = `tile ${data.type}`;
            tile.style.gridArea = gridPos[i];
            tile.id = `tile-${i}`;
            tile.innerHTML = `
                ${data.img ? `<img src="${data.img}">` : `<div style="font-size:30px">${data.emoji || '📝'}</div>`}
                <div class="tile-name">${data.name}</div>
                <div style="font-size:10px; color:#666">${data.info}</div>
            `;
            board.appendChild(tile);
        });

        TEAMS.forEach(team => {
            const bus = document.createElement('div');
            bus.className = 'bus';
            bus.id = `bus-${team.id}`;
            bus.innerText = team.icon;
            board.appendChild(bus);
        });

        this.updateStatus();
        this.positionBuses();
    }

    positionBuses() {
        this.teamPos.forEach((pos, id) => {
            const tile = document.getElementById(`tile-${pos}`);
            const bus = document.getElementById(`bus-${id}`);
            const offset = (id * 8) - 15;
            bus.style.left = (tile.offsetLeft + 40 + offset) + 'px';
            bus.style.top = (tile.offsetTop + 40 + offset) + 'px';
        });
    }

    updateStatus() {
        const panel = document.getElementById('status-panel');
        panel.innerHTML = '';
        TEAMS.forEach((team, i) => {
            const card = document.createElement('div');
            card.className = `team-card ${i === this.currentTeamIdx ? 'active' : ''}`;
            card.style.borderLeftColor = team.color;
            card.innerHTML = `<b>${team.name}</b><br>位置: ${BOARD_DATA[this.teamPos[i]].name}`;
            panel.appendChild(card);
        });
        document.getElementById('turn-display').innerText = `現在輪到：${TEAMS[this.currentTeamIdx].name}`;
        this.saveState();
    }

    async roll() {
        const btn = document.getElementById('roll-btn');
        btn.disabled = true;
        const roll = Math.floor(Math.random() * 6) + 1;
        document.getElementById('dice-display').innerText = "🎲 " + roll;

        const oldPos = this.teamPos[this.currentTeamIdx];
        let newPos = oldPos;

        for (let i = 0; i < roll; i++) {
            newPos++;
            if (newPos >= TILE_COUNT) {
                this.victory(TEAMS[this.currentTeamIdx]);
                newPos = 0;
            }
            this.teamPos[this.currentTeamIdx] = newPos;
            this.positionBuses();
            await new Promise(r => setTimeout(r, 300));
        }

        this.handleLanding(oldPos, newPos);
    }

    handleLanding(oldPos, newPos) {
        const tile = BOARD_DATA[newPos];
        const modal = document.getElementById('modal-overlay');
        const title = document.getElementById('modal-title');
        const desc = document.getElementById('modal-desc');
        const actionArea = document.getElementById('action-btns');
        actionArea.innerHTML = '';

        if (tile.type === "practice") {
            title.innerText = "✍️ 語法操練時間";
            desc.innerText = `${TEAMS[this.currentTeamIdx].name} 請聽題：\n\n${tile.info}`;
            this.addDecisionButtons(actionArea, oldPos);
            modal.style.display = 'flex';
        } else if (tile.type === "chance") {
            title.innerText = "🎲 機會與挑戰";
            desc.innerText = tile.info;
            this.addDecisionButtons(actionArea, newPos - 1 < 0 ? 0 : newPos - 1);
            modal.style.display = 'flex';
        } else {
            // 普通城市格，顯示小知識後換手
            setTimeout(() => this.nextTurn(), 1000);
        }
    }

    addDecisionButtons(container, backPos) {
        const btnOk = document.createElement('button');
        btnOk.className = 'btn btn-correct';
        btnOk.innerText = '✅ 挑戰成功';
        btnOk.onclick = () => {
            closeModal();
            this.nextTurn();
        };

        const btnFail = document.createElement('button');
        btnFail.className = 'btn btn-wrong';
        btnFail.innerText = '❌ 挑戰失敗 (退回)';
        btnFail.onclick = () => {
            closeModal();
            this.teamPos[this.currentTeamIdx] = backPos;
            this.positionBuses();
            setTimeout(() => this.nextTurn(), 500);
        };

        container.appendChild(btnOk);
        container.appendChild(btnFail);
    }

    nextTurn() {
        this.currentTeamIdx = (this.currentTeamIdx + 1) % 4;
        this.updateStatus();
        document.getElementById('roll-btn').disabled = false;
    }

    victory(team) {
        alert(`🎊 恭喜 ${team.name} 抵達終點，贏得旅遊大賽！`);
        this.reset();
    }

    reset() {
        localStorage.removeItem('taiwanGame');
        location.reload();
    }
}

let game;
window.onload = () => {
    game = new TravelGame();
    document.getElementById('roll-btn').onclick = () => game.roll();
    document.getElementById('reset-btn').onclick = () => {
        if(confirm("確定要重置所有組別的進度嗎？")) game.reset();
    };
};

function closeModal() {
    document.getElementById('modal-overlay').style.display = 'none';
}
</script>

</body>
</html>
