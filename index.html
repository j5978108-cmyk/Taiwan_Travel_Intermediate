<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣語文大冒險 - 金錢挑戰賽</title>
    <style>
        :root {
            --primary-color: #2e7d32;
            --accent-color: #ff9800;
            --tile-size: 155px;
        }

        body {
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* 背景設定為您提供的照片 */
            background: url('https://images.unsplash.com/photo-1552912115-46387060156d?auto=format&fit=crop&w=1600&q=80') no-repeat center center fixed;
            background-size: cover;
        }

        /* 遮罩讓文字更清晰 */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        header {
            padding: 15px;
            color: white;
            text-align: center;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        #music-bar {
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 20px;
            border-radius: 30px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* 棋盤 */
        #game-board {
            display: grid;
            grid-template-columns: repeat(6, var(--tile-size));
            grid-template-rows: repeat(6, var(--tile-size));
            gap: 8px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            border: 10px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .tile {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 8px;
            text-align: center;
            position: relative;
        }

        .tile-name { font-size: 24px; font-weight: 900; color: #2c3e50; margin-top: 5px; }
        .tile-img { width: 100%; height: 85px; object-fit: cover; border-radius: 5px; }

        .city { border-bottom: 8px solid #2196f3; }
        .practice { border-bottom: 8px solid #fbc02d; background: #fffde7; }
        .chance { border-bottom: 8px solid #f06292; background: #fdf2f8; }
        .special { background: #eceff1; border-bottom: 8px solid #78909c; }

        /* 控制中心 */
        #control-center {
            grid-column: 2 / 6;
            grid-row: 2 / 6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 20px;
            margin: 15px;
        }

        .bus {
            width: 50px; height: 50px;
            position: absolute;
            z-index: 100;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            font-size: 42px;
            display: flex;
            align-items: center; justify-content: center;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
        }

        .btn {
            padding: 15px 35px; font-size: 26px; font-weight: bold;
            cursor: pointer; background: linear-gradient(to bottom, #4caf50, #2e7d32);
            color: white; border: none; border-radius: 50px;
            box-shadow: 0 6px 0 #1b5e20; margin: 10px;
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #1b5e20; }

        /* 隊伍資訊卡 */
        #status-panel { display: flex; gap: 15px; margin-bottom: 15px; }
        .team-card {
            background: white; padding: 10px 20px; border-radius: 10px;
            min-width: 140px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            font-size: 18px; border-left: 10px solid #ccc;
        }
        .team-card.active { transform: scale(1.05); border-bottom: 5px solid var(--accent-color); }

        #modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85); display: none;
            justify-content: center; align-items: center; z-index: 2000;
        }
        #modal {
            background: white; padding: 40px; border-radius: 25px;
            width: 80%; max-width: 650px; text-align: center;
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<header>
    <h1>🇹🇼 台灣語文大冒險：金錢挑戰賽</h1>
</header>

<div id="music-bar">
    <span>🎵 背景音樂：</span>
    <iframe width="200" height="25" src="https://www.youtube.com/embed/fT-nO_9P4v0?autoplay=1" frameborder="0"></iframe>
</div>

<div id="status-panel"></div>

<div id="game-board">
    <div id="control-center">
        <div id="turn-display" style="font-size: 22px; font-weight: bold; color:#1b5e20"></div>
        <div id="dice-display" style="font-size: 70px; margin: 5px;">🎲</div>
        <button class="btn" id="roll-btn">擲骰子前進</button>
        <button id="reset-btn" style="margin-top:10px; background:none; border:none; color:#333; cursor:pointer; text-decoration:underline">重置遊戲</button>
    </div>
</div>

<div id="modal-overlay">
    <div id="modal">
        <h2 id="modal-title" style="color: #666;">任務挑戰</h2>
        <div id="modal-desc" style="font-size: 30px; font-weight: bold; margin: 30px 0;"></div>
        <p id="modal-reward" style="color: #2e7d32; font-size: 20px; font-weight: bold;"></p>
        <div style="display: flex; justify-content: space-around;">
            <button class="btn" style="background: #43a047;" onclick="game.handleDecision(true)">✅ 成功 (+$$)</button>
            <button class="btn" style="background: #e53935;" onclick="game.handleDecision(false)">❌ 失敗 (退回)</button>
        </div>
    </div>
</div>

<script>
const TILE_COUNT = 20;
const TEAMS = [
    { id: 0, name: "第一組", icon: "🚌", color: "#ff5252" },
    { id: 1, name: "第二組", icon: "🚐", color: "#448aff" },
    { id: 2, name: "第三組", icon: "🚓", color: "#4caf50" },
    { id: 3, name: "第四組", icon: "🚜", color: "#ffc107" }
];

//在地化事件池
const CHANCE_EVENTS = [
    { text: "大甲媽祖遶境：全組獲得保佑，獎金 $1000！", money: 1000 },
    { text: "外送雷：餐點全翻了，心情不好罰 $500！", money: -500 },
    { text: "中發票：恭喜中了五獎，獲得 $1000！", money: 1000 },
    { text: "萬萬稅：中華民國萬萬稅，繳交所得稅 $800！", money: -800 },
    { text: "遇到老同學：請你去喝珍奶，獲得 $300！", money: 300 },
    { text: "違規停車：被警察開單，罰款 $600！", money: -600 }
];

const BOARD_DATA = [
    { name: "起點", type: "special", emoji: "🏁" },
    { name: "台北", type: "city", img: "https://images.unsplash.com/photo-1583454155184-870a1f63aebc?w=300" },
    { name: "語法操練", type: "practice", desc: "請用「不但...而且...」造句。", reward: 500 },
    { name: "桃園", type: "city", img: "https://images.unsplash.com/photo-1570654639102-bdd95eeece7a?w=300" },
    { name: "機會命運", type: "chance" },
    { name: "新竹", type: "city", img: "https://images.unsplash.com/photo-1571406451730-804193613098?w=300" },
    { name: "語法操練", type: "practice", desc: "請用「既然...就...」造句。", reward: 500 },
    { name: "台中", type: "city", img: "https://images.unsplash.com/photo-159981881ef80-77a8286c8f92?w=300" },
    { name: "機會命運", type: "chance" },
    { name: "嘉義", type: "city", img: "https://images.unsplash.com/photo-1621929747188-0b4dc284980c?w=300" },
    { name: "休息站", type: "special", emoji: "🍵" },
    { name: "台南", type: "city", img: "https://images.unsplash.com/photo-1594132038755-d41c19be36e1?w=300" },
    { name: "語法操練", type: "practice", desc: "請用「除非...才...」造句。", reward: 500 },
    { name: "高雄", type: "city", img: "https://images.unsplash.com/photo-1552057774-60b665679951?w=300" },
    { name: "機會命運", type: "chance" },
    { name: "台東", type: "city", img: "https://images.unsplash.com/photo-1580665910386-8d1976a4455f?w=300" },
    { name: "語法操練", type: "practice", desc: "請用「與其...不如...」造句。", reward: 500 },
    { name: "花蓮", type: "city", img: "https://images.unsplash.com/photo-1584981442475-430c51121857?w=300" },
    { name: "機會命運", type: "chance" },
    { name: "宜蘭", type: "city", img: "https://images.unsplash.com/photo-1628082601955-f7734a7ed27b?w=300" }
];

class TravelGame {
    constructor() {
        this.teamPos = [0, 0, 0, 0];
        this.teamMoney = [0, 0, 0, 0];
        this.currentTeamIdx = 0;
        this.oldPos = 0;
        this.currentReward = 0;
        this.load();
        this.init();
    }

    init() {
        const board = document.getElementById('game-board');
        const gridMapping = ["6/1", "5/1", "4/1", "3/1", "2/1", "1/1", "1/2", "1/3", "1/4", "1/5", "1/6", "2/6", "3/6", "4/6", "5/6", "6/6", "6/5", "6/4", "6/3", "6/2"];

        BOARD_DATA.forEach((data, i) => {
            const tile = document.createElement('div');
            tile.className = `tile ${data.type}`;
            tile.style.gridArea = gridMapping[i];
            tile.id = `tile-${i}`;
            tile.innerHTML = `
                ${data.img ? `<img class="tile-img" src="${data.img}">` : `<div style="font-size:45px">${data.emoji || '❓'}</div>`}
                <div class="tile-name">${data.name}</div>
            `;
            board.appendChild(tile);
        });

        TEAMS.forEach(t => {
            const bus = document.createElement('div');
            bus.className = 'bus';
            bus.id = `bus-${t.id}`;
            bus.innerText = t.icon;
            board.appendChild(bus);
        });

        this.update();
        this.positionBuses();
    }

    positionBuses() {
        this.teamPos.forEach((pos, id) => {
            const tile = document.getElementById(`tile-${pos}`);
            const bus = document.getElementById(`bus-${id}`);
            const offset = (id * 12) - 24;
            bus.style.left = (tile.offsetLeft + 50 + offset) + 'px';
            bus.style.top = (tile.offsetTop + 50 + offset) + 'px';
        });
    }

    async roll() {
        document.getElementById('roll-btn').disabled = true;
        const steps = Math.floor(Math.random() * 6) + 1;
        document.getElementById('dice-display').innerText = "🎲 " + steps;

        this.oldPos = this.teamPos[this.currentTeamIdx];
        let p = this.oldPos;

        for (let i = 0; i < steps; i++) {
            p = (p + 1);
            if (p >= TILE_COUNT) {
                alert(`🎊 ${TEAMS[this.currentTeamIdx].name} 繞台一周！獲得獎金 $2000！`);
                this.teamMoney[this.currentTeamIdx] += 2000;
                p = 0;
            }
            this.teamPos[this.currentTeamIdx] = p;
            this.positionBuses();
            await new Promise(r => setTimeout(r, 400));
        }
        this.checkTile(p);
    }

    checkTile(pos) {
        const tile = BOARD_DATA[pos];
        const modal = document.getElementById('modal-overlay');
        const desc = document.getElementById('modal-desc');
        const rewardText = document.getElementById('modal-reward');

        if (tile.type === "practice") {
            desc.innerText = tile.desc;
            this.currentReward = tile.reward;
            rewardText.innerText = `💰 答對獎金：$${tile.reward}`;
            modal.style.display = 'flex';
        } else if (tile.type === "chance") {
            const ev = CHANCE_EVENTS[Math.floor(Math.random() * CHANCE_EVENTS.length)];
            desc.innerText = ev.text;
            this.currentReward = ev.money;
            rewardText.innerText = ev.money > 0 ? `💰 獲得獎金：$${ev.money}` : `💸 損失：$${Math.abs(ev.money)}`;
            modal.style.display = 'flex';
        } else {
            setTimeout(() => this.nextTurn(), 800);
        }
    }

    handleDecision(isSuccess) {
        document.getElementById('modal-overlay').style.display = 'none';
        if (isSuccess) {
            this.teamMoney[this.currentTeamIdx] += this.currentReward;
            if (this.teamMoney[this.currentTeamIdx] < 0) this.teamMoney[this.currentTeamIdx] = 0;
        } else {
            // 失敗退回原位
            this.teamPos[this.currentTeamIdx] = this.oldPos;
            this.positionBuses();
        }
        setTimeout(() => this.nextTurn(), 500);
    }

    nextTurn() {
        this.currentTeamIdx = (this.currentTeamIdx + 1) % 4;
        this.update();
        document.getElementById('roll-btn').disabled = false;
    }

    update() {
        const panel = document.getElementById('status-panel');
        panel.innerHTML = '';
        TEAMS.forEach((t, i) => {
            const card = document.createElement('div');
            card.className = `team-card ${i === this.currentTeamIdx ? 'active' : ''}`;
            card.style.borderLeftColor = t.color;
            card.innerHTML = `<b>${t.name}</b><br><span style="color:green; font-weight:bold">💰 $${this.teamMoney[i]}</span>`;
            panel.appendChild(card);
        });
        document.getElementById('turn-display').innerText = `目前輪到：${TEAMS[this.currentTeamIdx].name}`;
        this.save();
    }

    save() {
        localStorage.setItem('taiwanGameV3', JSON.stringify({
            p: this.teamPos, m: this.teamMoney, idx: this.currentTeamIdx
        }));
    }

    load() {
        const s = localStorage.getItem('taiwanGameV3');
        if (s) {
            const d = JSON.parse(s);
            this.teamPos = d.p; this.teamMoney = d.m; this.currentTeamIdx = d.idx;
        }
    }

    reset() {
        localStorage.removeItem('taiwanGameV3');
        location.reload();
    }
}

let game;
window.onload = () => {
    game = new TravelGame();
    document.getElementById('roll-btn').onclick = () => game.roll();
    document.getElementById('reset-btn').onclick = () => { if(confirm("重置所有組別金錢與位置嗎？")) game.reset(); };
};
</script>
</body>
</html>
